<!DOCTYPE html>
<html lang="zh-CN">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>欧盟化工行业监测</title>
  <style>
    * {
      box-sizing: border-box;
    }

    html, body {
      margin: 0;
      padding: 0;
      min-height: 100%;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, "PingFang SC", "Microsoft YaHei", sans-serif;
      background: #020617;
      color: #fff;
    }

    body {
      position: relative;
      overflow-x: hidden;
    }

    .bg-grid {
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(255,255,255,.05) 1px, transparent 1px),
        linear-gradient(90deg, rgba(255,255,255,.05) 1px, transparent 1px);
      background-size: 60px 60px;
      opacity: 0.25;
      z-index: 0;
      pointer-events: none;
    }

    .glow {
      position: fixed;
      width: 420px;
      height: 420px;
      filter: blur(140px);
      opacity: 0.25;
      z-index: 0;
      pointer-events: none;
    }

    .glow-1 {
      background: #2563eb;
      top: -120px;
      left: -120px;
    }

    .glow-2 {
      background: #4f46e5;
      bottom: -120px;
      right: -120px;
    }

    .page {
      position: relative;
      z-index: 1;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 40px 24px;
    }

    .wrapper {
      width: 100%;
      max-width: 1100px;
    }

    .title {
      margin: 0 0 24px;
      text-align: center;
      font-size: 56px;
      font-weight: 700;
      line-height: 1.15;
    }

    .desc {
      max-width: 700px;
      margin: 0 auto 80px;
      text-align: center;
      color: #cbd5f5;
      font-size: 18px;
      line-height: 1.8;
    }

    .grid {
      display: grid;
      grid-template-columns: repeat(2, minmax(0, 1fr));
      gap: 28px;
    }

    .card-link {
      text-decoration: none;
      color: inherit;
      display: block;
    }

    .card {
      background: rgba(255,255,255,0.04);
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 16px;
      padding: 36px;
      min-height: 180px;
      display: flex;
      flex-direction: column;
      justify-content: center;
      transition: transform .25s ease, border-color .25s ease, background .25s ease, box-shadow .25s ease;
      box-shadow: 0 10px 30px rgba(0,0,0,0.18);
    }

    .card:hover {
      transform: translateY(-6px);
      border-color: rgba(96,165,250,0.65);
      background: rgba(255,255,255,0.06);
      box-shadow: 0 18px 40px rgba(0,0,0,0.28);
    }

    .card-title {
      margin: 0 0 14px;
      font-size: 28px;
      font-weight: 700;
      line-height: 1.3;
    }

    .card-btn {
      font-size: 16px;
      font-weight: 500;
      color: #60a5fa;
    }

    .footer {
      margin-top: 100px;
      text-align: center;
      font-size: 13px;
      color: #64748b;
    }

    @media (max-width: 900px) {
      .title {
        font-size: 42px;
      }

      .desc {
        font-size: 16px;
        margin-bottom: 56px;
      }

      .grid {
        grid-template-columns: 1fr;
      }
    }

    @media (max-width: 480px) {
      .page {
        padding: 32px 16px;
      }

      .title {
        font-size: 34px;
      }

      .card {
        padding: 28px;
        min-height: 150px;
      }

      .card-title {
        font-size: 24px;
      }
    }
  </style>
</head>
<body>
  <div class="bg-grid"></div>
  <div class="glow glow-1"></div>
  <div class="glow glow-2"></div>

  <main class="page">
    <section class="wrapper">
      <h1 class="title">欧盟化工行业监测</h1>

      <p class="desc">
        持续追踪欧盟化工行业政策变化、市场趋势与生产动态。
        每周发布行业情报报告，为行业研究、投资决策与市场分析提供高价值信息参考。
      </p>

      <div class="grid">
        <a
          class="card-link"
          href="weeks/2026-w12.html"
        
        >
          <div class="card">
            <div class="card-title">最新情报 The Latest News</div>
            <div class="card-btn">进入查看 Enter →</div>
          </div>
        </a>

        <a
          class="card-link"
          href="archive.html"
        
        >
          <div class="card">
            <div class="card-title">历史周报 Historical Reports</div>
            <div class="card-btn">查看归档 View Archive →</div>
          </div>
        </a>
      </div>

      <div class="footer">
        欧盟化工行业监测平台 · EU Chemical Industry Monitoring· 巴塞罗那技术中心 Barcelona Technical Center 
      </div>
    </section>
  </main>
</body>
</html>
